appId: com.rase.launcher
productName: Rase Launcher
directories:
  output: dist-package # Output folder for compiled installers
files:
  - dist/**/*          # Frontend built assets
  - dist-electron/**/* # Compiled Electron backend files
  - package.json
win:
  target:
    - nsis             # Modern NSIS Installer executable
    - portable         # Single-file portable executable
    - zip              # Portable ZIP archive
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  runAfterFinish: true
linux:
  target:
    - AppImage         # Universal Linux plug-and-play binary
    - tar.gz           # High-performance compressed archive for Arch/AUR
  category: Game
  synopsis: A sleek, minimalist glassmorphism Minecraft Launcher.
  description: A high-performance, modern, and beautiful custom Minecraft Launcher with offline authentication, easy loader injection, and seamless drag-and-drop mods management.
