<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Rase Launcher - Oyun İçi Panel. Sistem durumu, medya kontrolü ve ses mikseri." />
  <meta name="theme-color" content="#07080f" />
  <title>Rase — Oyun İçi Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ─────────────────────────────────────────
       CSS CUSTOM PROPERTIES
    ───────────────────────────────────────── */
    :root {
      --terracotta:        #e8553a;
      --terracotta-light:  #ff6b4a;
      --terracotta-glow:   rgba(232, 85, 58, 0.35);
      --terracotta-subtle: rgba(232, 85, 58, 0.12);
      --dark:              #07080f;
      --dark-2:            #0d0f1a;
      --dark-3:            #121422;
      --dark-4:            #1a1c2e;
      --surface:           rgba(255, 255, 255, 0.04);
      --surface-hover:     rgba(255, 255, 255, 0.07);
      --border:            rgba(255, 255, 255, 0.08);
      --border-strong:     rgba(255, 255, 255, 0.14);
      --text-primary:      #f0f0f8;
      --text-secondary:    rgba(240, 240, 248, 0.55);
      --text-muted:        rgba(240, 240, 248, 0.30);
      --green:             #2ecc71;
      --green-glow:        rgba(46, 204, 113, 0.4);
      --red:               #e74c3c;
      --red-glow:          rgba(231, 76, 60, 0.4);
      --radius-sm:         10px;
      --radius:            18px;
      --radius-lg:         24px;
      --blur:              blur(16px);
      --blur-strong:       blur(24px);
      --transition:        cubic-bezier(0.4, 0, 0.2, 1);
      --safe-bottom:       env(safe-area-inset-bottom, 0px);
    }

    /* ─────────────────────────────────────────
       RESET & BASE
    ───────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background-color: var(--dark);
      color: var(--text-primary);
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ─────────────────────────────────────────
       ANIMATED BACKGROUND
    ───────────────────────────────────────── */
    .bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: orbFloat 12s ease-in-out infinite;
    }

    .bg-orb-1 {
      width: 380px;
      height: 380px;
      background: var(--terracotta);
      top: -100px;
      right: -120px;
      animation-delay: 0s;
    }

    .bg-orb-2 {
      width: 280px;
      height: 280px;
      background: #7c3aed;
      bottom: 20%;
      left: -80px;
      animation-delay: -4s;
    }

    .bg-orb-3 {
      width: 200px;
      height: 200px;
      background: var(--terracotta);
      bottom: 5%;
      right: 10%;
      animation-delay: -8s;
      opacity: 0.1;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%       { transform: translate(-20px, 20px) scale(1.05); }
      66%       { transform: translate(15px, -15px) scale(0.95); }
    }

    /* Grid pattern overlay */
    .bg-canvas::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* ─────────────────────────────────────────
       LAYOUT
    ───────────────────────────────────────── */
    .app {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 0 16px calc(24px + var(--safe-bottom));
    }

    /* ─────────────────────────────────────────
       GLASS CARD BASE
    ───────────────────────────────────────── */
    .card {
      background: var(--surface);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 14px;
      transition: border-color 0.3s var(--transition), transform 0.2s var(--transition);
      will-change: transform;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    .card:active {
      transform: scale(0.995);
    }

    /* ─────────────────────────────────────────
       1. HEADER CARD
    ───────────────────────────────────────── */
    .header-card {
      padding: 24px 22px 20px;
      margin-top: 20px;
      background: linear-gradient(135deg,
        rgba(232, 85, 58, 0.15) 0%,
        rgba(255,255,255,0.03) 60%
      );
      border-color: rgba(232, 85, 58, 0.25);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo-group {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .logo-wordmark {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, var(--terracotta-light), #ff9f85);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .logo-subtitle {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* Connection status badge */
    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 7px 14px 7px 10px;
      transition: all 0.4s var(--transition);
    }

    .status-badge.connected {
      border-color: rgba(46, 204, 113, 0.35);
      background: rgba(46, 204, 113, 0.08);
    }

    .status-badge.disconnected {
      border-color: rgba(231, 76, 60, 0.35);
      background: rgba(231, 76, 60, 0.08);
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--red);
      transition: background 0.4s var(--transition);
      flex-shrink: 0;
    }

    .status-badge.connected .status-dot {
      background: var(--green);
      box-shadow: 0 0 0 0 var(--green-glow);
      animation: pulse-green 2s ease-in-out infinite;
    }

    .status-badge.disconnected .status-dot {
      background: var(--red);
      animation: none;
    }

    @keyframes pulse-green {
      0%   { box-shadow: 0 0 0 0   rgba(46, 204, 113, 0.6); }
      60%  { box-shadow: 0 0 0 8px rgba(46, 204, 113, 0); }
      100% { box-shadow: 0 0 0 0   rgba(46, 204, 113, 0); }
    }

    .status-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      transition: color 0.3s;
    }

    .status-badge.connected  .status-label { color: var(--green); }
    .status-badge.disconnected .status-label { color: var(--red); }

    .reconnect-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 10px;
      text-align: center;
      display: none;
    }

    .reconnect-hint.visible { display: block; }

    /* ─────────────────────────────────────────
       CARD HEADER ROWS
    ───────────────────────────────────────── */
    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .card-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--terracotta-subtle);
      border: 1px solid rgba(232, 85, 58, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ─────────────────────────────────────────
       2. MEDIA CARD
    ───────────────────────────────────────── */
    .media-card {
      background: linear-gradient(135deg,
        rgba(232, 85, 58, 0.10) 0%,
        rgba(255,255,255,0.03) 70%
      );
    }

    .media-info {
      margin-bottom: 20px;
    }

    .media-song {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.25;
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .media-artist {
      font-size: 14px;
      font-weight: 400;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Animated equalizer bars (playing indicator) */
    .eq-bars {
      display: inline-flex;
      align-items: flex-end;
      gap: 3px;
      height: 16px;
      margin-right: 8px;
      vertical-align: middle;
    }

    .eq-bar {
      width: 3px;
      border-radius: 2px;
      background: var(--terracotta);
      animation: eqBounce 0.8s ease-in-out infinite;
    }

    .eq-bar:nth-child(1) { animation-delay: 0s;     height: 60%; }
    .eq-bar:nth-child(2) { animation-delay: 0.15s;  height: 100%; }
    .eq-bar:nth-child(3) { animation-delay: 0.3s;   height: 40%; }
    .eq-bar:nth-child(4) { animation-delay: 0.45s;  height: 80%; }

    @keyframes eqBounce {
      0%, 100% { transform: scaleY(0.4); }
      50%       { transform: scaleY(1); }
    }

    .eq-bars.paused .eq-bar { animation-play-state: paused; }

    /* Media progress bar */
    .media-progress-wrap {
      margin-bottom: 20px;
    }

    .media-progress-track {
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .media-progress-fill {
      height: 100%;
      width: 45%;
      background: linear-gradient(90deg, var(--terracotta), var(--terracotta-light));
      border-radius: 99px;
      transition: width 0.5s linear;
    }

    /* Control buttons row */
    .media-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    .ctrl-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      cursor: pointer;
      transition: all 0.2s var(--transition);
      -webkit-user-select: none;
      user-select: none;
      font-family: inherit;
    }

    .ctrl-btn-side {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: var(--surface-hover);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 20px;
    }

    .ctrl-btn-side:active {
      transform: scale(0.88);
      background: var(--terracotta-subtle);
      color: var(--terracotta);
      border-color: rgba(232,85,58,0.3);
    }

    .ctrl-btn-play {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--terracotta), var(--terracotta-light));
      border: none;
      color: #fff;
      font-size: 24px;
      box-shadow: 0 8px 24px var(--terracotta-glow);
    }

    .ctrl-btn-play:active {
      transform: scale(0.90);
      box-shadow: 0 4px 12px var(--terracotta-glow);
    }

    /* ─────────────────────────────────────────
       3. SYSTEM STATUS CARD
    ───────────────────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .stat-item {
      background: var(--surface-hover);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px;
      transition: border-color 0.3s;
    }

    .stat-item:hover {
      border-color: var(--border-strong);
    }

    .stat-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1;
      margin-bottom: 8px;
    }

    .stat-value .unit {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-secondary);
      margin-left: 2px;
    }

    .stat-value .sub {
      font-size: 12px;
      font-weight: 400;
      color: var(--text-muted);
      display: block;
      margin-top: 2px;
    }

    /* Progress bar */
    .stat-bar-track {
      height: 5px;
      background: rgba(255,255,255,0.07);
      border-radius: 99px;
      overflow: hidden;
    }

    .stat-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--terracotta), var(--terracotta-light));
      transition: width 0.6s var(--transition);
      position: relative;
    }

    .stat-bar-fill::after {
      content: '';
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--terracotta-light);
      box-shadow: 0 0 6px var(--terracotta);
    }

    /* FPS big display */
    .stat-fps .stat-value {
      font-size: 36px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--terracotta-light), #ffb399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Game time */
    .stat-gametime .stat-value {
      font-size: 20px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.5px;
    }

    /* Full-width stat items */
    .stat-item.full-width {
      grid-column: 1 / -1;
    }

    /* ─────────────────────────────────────────
       4. AUDIO MIXER CARD
    ───────────────────────────────────────── */
    .mixer-empty {
      text-align: center;
      padding: 20px 0 8px;
      color: var(--text-muted);
      font-size: 14px;
    }

    .mixer-empty .empty-icon {
      font-size: 32px;
      margin-bottom: 10px;
      display: block;
      opacity: 0.5;
    }

    .mixer-sessions {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .mixer-session {
      position: relative;
    }

    .mixer-session-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .mixer-app-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .mixer-app-vol {
      font-size: 13px;
      font-weight: 600;
      color: var(--terracotta);
      min-width: 38px;
      text-align: right;
    }

    .mixer-controls-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Slider styling */
    .vol-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      border-radius: 99px;
      background: rgba(255,255,255,0.08);
      outline: none;
      cursor: pointer;
      position: relative;
    }

    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--terracotta), var(--terracotta-light));
      cursor: pointer;
      box-shadow: 0 2px 8px var(--terracotta-glow);
      border: 2px solid rgba(255,255,255,0.15);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .vol-slider::-webkit-slider-thumb:active {
      transform: scale(1.25);
      box-shadow: 0 4px 16px var(--terracotta-glow);
    }

    .vol-slider::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--terracotta), var(--terracotta-light));
      cursor: pointer;
      box-shadow: 0 2px 8px var(--terracotta-glow);
      border: 2px solid rgba(255,255,255,0.15);
    }

    /* Slider track fill via CSS custom property */
    .vol-slider {
      --pct: 100%;
      background: linear-gradient(
        to right,
        var(--terracotta) 0%,
        var(--terracotta-light) var(--pct),
        rgba(255,255,255,0.08) var(--pct)
      );
    }

    /* Mute button */
    .mute-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--surface-hover);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s var(--transition);
      flex-shrink: 0;
      font-family: inherit;
    }

    .mute-btn:active {
      transform: scale(0.88);
    }

    .mute-btn.muted {
      background: rgba(231, 76, 60, 0.15);
      border-color: rgba(231, 76, 60, 0.35);
      color: var(--red);
    }

    .mute-btn.unmuted {
      background: var(--terracotta-subtle);
      border-color: rgba(232, 85, 58, 0.25);
      color: var(--terracotta);
    }

    /* Divider between sessions */
    .mixer-session + .mixer-session {
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    /* ─────────────────────────────────────────
       SKELETON LOADER
    ───────────────────────────────────────── */
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position:  400px 0; }
    }

    .skeleton {
      background: linear-gradient(90deg,
        rgba(255,255,255,0.05) 0%,
        rgba(255,255,255,0.10) 50%,
        rgba(255,255,255,0.05) 100%
      );
      background-size: 800px 100%;
      animation: shimmer 1.6s ease-in-out infinite;
      border-radius: 6px;
    }

    /* ─────────────────────────────────────────
       TOAST NOTIFICATION
    ───────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: calc(20px + var(--safe-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--dark-4);
      border: 1px solid var(--border-strong);
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: 50px;
      white-space: nowrap;
      z-index: 999;
      transition: transform 0.35s var(--transition), opacity 0.35s;
      opacity: 0;
      backdrop-filter: var(--blur);
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ─────────────────────────────────────────
       SCROLLBAR
    ───────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: var(--border-strong);
      border-radius: 99px;
    }

    /* ─────────────────────────────────────────
       RESPONSIVE TWEAKS
    ───────────────────────────────────────── */
    @media (max-width: 360px) {
      .logo-wordmark { font-size: 26px; }
      .stats-grid { grid-template-columns: 1fr; }
      .ctrl-btn-play { width: 56px; height: 56px; font-size: 20px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .bg-orb, .eq-bar { animation: none; }
    }
  </style>
</head>

<body>
  <!-- Animated background -->
  <div class="bg-canvas" aria-hidden="true">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
  </div>

  <main class="app" role="main">

    <!-- ═══════════════════════════════════════
         1. HEADER CARD
    ═══════════════════════════════════════ -->
    <header class="card header-card" id="header-card">
      <div class="header-top">
        <div class="logo-group">
          <span class="logo-wordmark">Rase</span>
          <span class="logo-subtitle">Oyun İçi Panel</span>
        </div>
        <div class="status-badge disconnected" id="status-badge" role="status" aria-live="polite">
          <div class="status-dot" id="status-dot"></div>
          <span class="status-label" id="status-label">Bağlanıyor</span>
        </div>
      </div>
      <p class="reconnect-hint" id="reconnect-hint">⟳ 3 saniyede tekrar bağlanmaya çalışılıyor…</p>
    </header>

    <!-- ═══════════════════════════════════════
         2. MEDYA KARTI
    ═══════════════════════════════════════ -->
    <section class="card media-card" aria-label="Medya Kontrolü">
      <div class="card-header">
        <div class="card-icon">🎵</div>
        <h2 class="card-title">Şu An Çalıyor</h2>
      </div>

      <div class="media-info">
        <div class="media-song" id="media-song">
          <span class="eq-bars paused" id="eq-bars" aria-hidden="true">
            <span class="eq-bar"></span>
            <span class="eq-bar"></span>
            <span class="eq-bar"></span>
            <span class="eq-bar"></span>
          </span>
          Bekleniyor…
        </div>
        <div class="media-artist" id="media-artist">—</div>
      </div>

      <div class="media-progress-wrap" aria-hidden="true">
        <div class="media-progress-track">
          <div class="media-progress-fill" id="media-progress"></div>
        </div>
      </div>

      <div class="media-controls" role="group" aria-label="Oynatma kontrolleri">
        <button class="ctrl-btn ctrl-btn-side" id="btn-prev" aria-label="Önceki parça" title="Önceki">⏮</button>
        <button class="ctrl-btn ctrl-btn-play" id="btn-play" aria-label="Oynat / Duraklat" title="Oynat / Duraklat">⏸</button>
        <button class="ctrl-btn ctrl-btn-side" id="btn-next" aria-label="Sonraki parça" title="Sonraki">⏭</button>
      </div>
    </section>

    <!-- ═══════════════════════════════════════
         3. SİSTEM DURUMU KARTI
    ═══════════════════════════════════════ -->
    <section class="card" aria-label="Sistem Durumu">
      <div class="card-header">
        <div class="card-icon">📊</div>
        <h2 class="card-title">Sistem Durumu</h2>
      </div>

      <div class="stats-grid">
        <!-- RAM -->
        <div class="stat-item" id="stat-ram">
          <div class="stat-label">RAM</div>
          <div class="stat-value" id="ram-value">—<span class="unit">GB</span></div>
          <div class="stat-bar-track">
            <div class="stat-bar-fill" id="ram-bar" style="width:0%"></div>
          </div>
        </div>

        <!-- CPU -->
        <div class="stat-item" id="stat-cpu">
          <div class="stat-label">CPU</div>
          <div class="stat-value" id="cpu-value">—<span class="unit">%</span></div>
          <div class="stat-bar-track">
            <div class="stat-bar-fill" id="cpu-bar" style="width:0%"></div>
          </div>
        </div>

        <!-- FPS -->
        <div class="stat-item stat-fps" id="stat-fps">
          <div class="stat-label">FPS</div>
          <div class="stat-value" id="fps-value">—</div>
        </div>

        <!-- Oyun Süresi -->
        <div class="stat-item stat-gametime" id="stat-gametime">
          <div class="stat-label">Oyun Süresi</div>
          <div class="stat-value" id="gametime-value" style="font-size:18px;">—:——:——</div>
        </div>
      </div>
    </section>

    <!-- ═══════════════════════════════════════
         4. SES MİKSERİ KARTI
    ═══════════════════════════════════════ -->
    <section class="card" aria-label="Ses Mikseri">
      <div class="card-header">
        <div class="card-icon">🎚️</div>
        <h2 class="card-title">Ses Mikseri</h2>
      </div>

      <div id="mixer-content">
        <div class="mixer-empty">
          <span class="empty-icon">🔇</span>
          Ses çalan uygulama bulunamadı
        </div>
      </div>
    </section>

  </main>

  <!-- Toast notification -->
  <div id="toast" role="alert" aria-live="assertive"></div>

  <script>
    /* ═══════════════════════════════════════════════════════
       CONSTANTS & STATE
    ═══════════════════════════════════════════════════════ */
    const APP_NAME_MAP = {
      'javaw.exe':      'Minecraft ☕',
      'chrome.exe':     'Chrome 🌐',
      'firefox.exe':    'Firefox 🦊',
      'spotify.exe':    'Spotify 🎵',
      'discord.exe':    'Discord 💬',
      'steam.exe':      'Steam 🎮',
      'vlc.exe':        'VLC 📺',
      'msedge.exe':     'Edge 🌐',
      'opera.exe':      'Opera 🌐',
      'brave.exe':      'Brave 🦁',
      'teams.exe':      'Teams 💼',
      'zoom.exe':       'Zoom 📹',
      'obs64.exe':      'OBS Studio 📽️',
      'obs32.exe':      'OBS Studio 📽️',
      'foobar2000.exe': 'Foobar2000 🎵',
      'winamp.exe':     'Winamp 🎵',
      'systemsoundsservice.exe': 'Sistem Sesleri 🔔',
    };

    let ws         = null;
    let wsReady    = false;
    let retryTimer = null;
    let isPlaying  = true;

    // Mute state map: appId -> bool
    const muteState = {};

    /* ═══════════════════════════════════════════════════════
       TOAST
    ═══════════════════════════════════════════════════════ */
    let toastTimer = null;
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
    }

    /* ═══════════════════════════════════════════════════════
       WEBSOCKET
    ═══════════════════════════════════════════════════════ */
    function connectWS() {
      if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) return;

      ws = new WebSocket('ws://' + location.host);

      ws.onopen = () => {
        wsReady = true;
        clearTimeout(retryTimer);
        setStatus(true);
        showToast('✅ Bağlantı kuruldu');
      };

      ws.onclose = () => {
        wsReady = false;
        setStatus(false);
        scheduleReconnect();
      };

      ws.onerror = () => {
        wsReady = false;
        setStatus(false);
      };

      ws.onmessage = (e) => {
        let msg;
        try { msg = JSON.parse(e.data); }
        catch { return; }

        if (msg.type === 'stats') updateStats(msg.data);
        if (msg.type === 'audio') updateAudioMixer(msg.data);
        if (msg.type === 'media') updateMediaInfo(msg.data);
      };
    }

    function scheduleReconnect() {
      clearTimeout(retryTimer);
      document.getElementById('reconnect-hint').classList.add('visible');
      retryTimer = setTimeout(() => {
        document.getElementById('reconnect-hint').classList.remove('visible');
        connectWS();
      }, 3000);
    }

    function sendWS(payload) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(payload));
      }
    }

    /* ═══════════════════════════════════════════════════════
       STATUS INDICATOR
    ═══════════════════════════════════════════════════════ */
    function setStatus(connected) {
      const badge = document.getElementById('status-badge');
      const label = document.getElementById('status-label');
      badge.classList.toggle('connected', connected);
      badge.classList.toggle('disconnected', !connected);
      label.textContent = connected ? 'Bağlı' : 'Bağlantı Yok';
    }

    /* ═══════════════════════════════════════════════════════
       MEDIA CONTROLS
    ═══════════════════════════════════════════════════════ */
    document.getElementById('btn-prev').addEventListener('click', () => {
      sendWS({ type: 'media', action: 'prev' });
      showToast('⏮ Önceki parça');
    });

    document.getElementById('btn-next').addEventListener('click', () => {
      sendWS({ type: 'media', action: 'next' });
      showToast('⏭ Sonraki parça');
    });

    document.getElementById('btn-play').addEventListener('click', () => {
      isPlaying = !isPlaying;
      const action = isPlaying ? 'play' : 'pause';
      sendWS({ type: 'media', action });
      updatePlayButton(isPlaying);
    });

    function updatePlayButton(playing) {
      document.getElementById('btn-play').textContent = playing ? '⏸' : '▶';
      const eq = document.getElementById('eq-bars');
      eq.classList.toggle('paused', !playing);
    }

    /* ═══════════════════════════════════════════════════════
       UPDATE MEDIA INFO
    ═══════════════════════════════════════════════════════ */
    function updateMediaInfo(data) {
      if (!data) return;
      const songEl   = document.getElementById('media-song');
      const artistEl = document.getElementById('media-artist');

      // Rebuild song with eq-bars inside
      const eq = document.getElementById('eq-bars');
      songEl.innerHTML = '';
      songEl.appendChild(eq);
      songEl.appendChild(document.createTextNode(' ' + (data.title || 'Bilinmiyor')));
      artistEl.textContent = data.artist || '—';

      if (typeof data.isPlaying === 'boolean') {
        isPlaying = data.isPlaying;
        updatePlayButton(isPlaying);
      }

      if (typeof data.progress === 'number') {
        document.getElementById('media-progress').style.width = (data.progress * 100).toFixed(1) + '%';
      }
    }

    /* ═══════════════════════════════════════════════════════
       UPDATE SYSTEM STATS
    ═══════════════════════════════════════════════════════ */
    function updateStats(data) {
      if (!data) return;

      // RAM
      if (data.ram !== undefined) {
        const used  = parseFloat(data.ram.used  || 0).toFixed(1);
        const total = parseFloat(data.ram.total || 0).toFixed(1);
        const pct   = total > 0 ? ((used / total) * 100).toFixed(0) : 0;
        document.getElementById('ram-value').innerHTML =
          `${used}<span class="unit">/${total} GB</span>`;
        document.getElementById('ram-bar').style.width = pct + '%';
      }

      // CPU
      if (data.cpu !== undefined) {
        const pct = parseFloat(data.cpu).toFixed(0);
        document.getElementById('cpu-value').innerHTML =
          `${pct}<span class="unit">%</span>`;
        document.getElementById('cpu-bar').style.width = pct + '%';
      }

      // FPS
      if (data.fps !== undefined) {
        document.getElementById('fps-value').textContent = Math.round(data.fps);
      }

      // Game time (seconds -> HH:MM:SS)
      if (data.gameTime !== undefined) {
        document.getElementById('gametime-value').textContent = formatTime(data.gameTime);
      }
    }

    function formatTime(seconds) {
      const s   = Math.floor(seconds);
      const hh  = String(Math.floor(s / 3600)).padStart(2, '0');
      const mm  = String(Math.floor((s % 3600) / 60)).padStart(2, '0');
      const ss  = String(s % 60).padStart(2, '0');
      return `${hh}:${mm}:${ss}`;
    }

    /* ═══════════════════════════════════════════════════════
       UPDATE AUDIO MIXER
    ═══════════════════════════════════════════════════════ */
    function updateAudioMixer(sessions) {
      const container = document.getElementById('mixer-content');
      container.innerHTML = '';

      if (!sessions || sessions.length === 0) {
        container.innerHTML = `
          <div class="mixer-empty">
            <span class="empty-icon">🔇</span>
            Ses çalan uygulama bulunamadı
          </div>`;
        return;
      }

      const wrap = document.createElement('div');
      wrap.className = 'mixer-sessions';

      sessions.forEach(session => {
        const appId   = session.id   || session.appId || session.name || Math.random();
        const rawName = (session.name || session.appId || 'Uygulama').toLowerCase();
        const appName = resolveAppName(rawName);
        const vol     = typeof session.volume === 'number' ? session.volume : 1.0;
        const muted   = session.muted === true || muteState[appId] === true;

        muteState[appId] = muted;

        const pct = Math.round(vol * 100);

        const div = document.createElement('div');
        div.className = 'mixer-session';
        div.dataset.appId = appId;
        div.innerHTML = `
          <div class="mixer-session-header">
            <span class="mixer-app-name">${escapeHtml(appName)}</span>
            <span class="mixer-app-vol" id="vol-label-${cssId(appId)}">${pct}%</span>
          </div>
          <div class="mixer-controls-row">
            <input
              type="range"
              class="vol-slider"
              id="slider-${cssId(appId)}"
              min="0" max="100"
              value="${pct}"
              aria-label="${escapeHtml(appName)} ses seviyesi"
              style="--pct: ${pct}%"
            />
            <button
              class="mute-btn ${muted ? 'muted' : 'unmuted'}"
              id="mute-btn-${cssId(appId)}"
              aria-label="${muted ? 'Sesi aç' : 'Sesi kapat'} — ${escapeHtml(appName)}"
              data-app-id="${appId}"
            >${muted ? '🔇' : '🔊'}</button>
          </div>
        `;

        wrap.appendChild(div);

        // Slider events (after insertion)
        requestAnimationFrame(() => {
          const slider  = document.getElementById(`slider-${cssId(appId)}`);
          const volLabel = document.getElementById(`vol-label-${cssId(appId)}`);
          const muteBtn = document.getElementById(`mute-btn-${cssId(appId)}`);

          if (slider) {
            slider.addEventListener('input', () => {
              const v = parseInt(slider.value);
              slider.style.setProperty('--pct', v + '%');
              if (volLabel) volLabel.textContent = v + '%';
              sendWS({ type: 'volume', appId, volume: v / 100 });
            });
          }

          if (muteBtn) {
            muteBtn.addEventListener('click', () => {
              muteState[appId] = !muteState[appId];
              const nowMuted = muteState[appId];
              muteBtn.textContent = nowMuted ? '🔇' : '🔊';
              muteBtn.classList.toggle('muted',   nowMuted);
              muteBtn.classList.toggle('unmuted', !nowMuted);
              muteBtn.setAttribute('aria-label',
                (nowMuted ? 'Sesi aç' : 'Sesi kapat') + ' — ' + appName);
              sendWS({ type: 'mute', appId, muted: nowMuted });
              showToast(nowMuted ? `🔇 ${appName} susturuldu` : `🔊 ${appName} açıldı`);
            });
          }
        });
      });

      container.appendChild(wrap);
    }

    function resolveAppName(raw) {
      const lc = raw.toLowerCase();
      if (APP_NAME_MAP[lc]) return APP_NAME_MAP[lc];
      // strip .exe and capitalize
      const base = lc.replace(/\.exe$/, '');
      return base.charAt(0).toUpperCase() + base.slice(1);
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // Make a CSS-safe ID
    function cssId(id) {
      return String(id).replace(/[^a-zA-Z0-9_-]/g, '_');
    }

    /* ═══════════════════════════════════════════════════════
       BOOT
    ═══════════════════════════════════════════════════════ */
    connectWS();
  </script>
</body>
</html>
